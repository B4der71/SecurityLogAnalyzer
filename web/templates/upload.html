{% extends "base.html" %}

{% block title %}
Upload Logs
{% endblock %}

{% block content %}

<h2>Upload Log File</h2>


{% if success %}
<p style="color: green;">
    {{ success }}
</p>
{% endif %}

{% if error %}
<p style="color: red;">
    {{ error }}
</p>
{% endif %}


<form
    action="{{ url_for('upload_page') }}"
    method="post"
    enctype="multipart/form-data"
>

    <p>
        <input
            type="file"
            name="log_file"
            required
        >
    </p>

    <p>
        <button type="submit">
            Upload
        </button>
    </p>

</form>

{% endblock %}
