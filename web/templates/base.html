<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
            Security Log Analyzer
        {% endblock %}
    </title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body>

<header>

    <h1>Security Log Analyzer</h1>

    <nav>

        <a href="{{ url_for('dashboard') }}">
            Dashboard
        </a>

        <a href="{{ url_for('upload_page') }}">
            Upload
        </a>

        <a href="{{ url_for('logs_page') }}">
            Logs
        </a>

    </nav>

</header>

<div class="container">

{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

{% for category, message in messages %}

<div class="flash-{{ category }}">
    {{ message }}
</div>

{% endfor %}

{% endif %}

{% endwith %}

{% block content %}
{% endblock %}

</div>

<footer>

    Security Log Analyzer • Version 1.0

</footer>

</body>

</html>
